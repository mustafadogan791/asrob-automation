name: AsroB Automation

on:
  schedule:
    # Türkiye saati: hafta içi 09:20, 18:25, 18:30 ve 18:40 (UTC+3)
    - cron: '20 6 * * 1-5'
    - cron: '25 15 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '40 15 * * 1-5'
  workflow_dispatch:
    inputs:
      task:
        description: Elle çalıştırılacak güvenli otomasyon adımı
        required: true
        default: settlement
        type: choice
        options:
          - voting_warning
          - settlement
          - price_backfill
          - poll_opening
          - poll_announcement
      backfill_date:
        description: price_backfill için işlem günü (YYYY-MM-DD)
        required: false
        type: string

jobs:
  voting_warning:
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '20 6 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'voting_warning')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_CREDENTIALS_JSON }}' > firebase-credentials.json
      - name: Send voting closing reminder
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_CREDENTIALS_PATH: firebase-credentials.json
        run: python send_notification.py --type voting_closing

  settlement:
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '25 15 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'settlement')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch today's BIST closing prices
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python bist_scraper.py --mode prices
      - name: Score today's locked predictions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python daily_scoring.py
      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_CREDENTIALS_JSON }}' > firebase-credentials.json
      - name: Send result notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_CREDENTIALS_PATH: firebase-credentials.json
        run: python send_notification.py --type results_ready

  price_backfill:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.task == 'price_backfill'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetch verified closing prices for selected date
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          BACKFILL_DATE: ${{ inputs.backfill_date }}
        run: python bist_scraper.py --mode prices --date "$BACKFILL_DATE"

  poll_opening:
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '30 15 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'poll_opening')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create next business day's polls
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python bist_scraper.py --mode polls

  poll_announcement:
    runs-on: ubuntu-latest
    if: >-
      github.event.schedule == '40 15 * * 1-5' ||
      (github.event_name == 'workflow_dispatch' && inputs.task == 'poll_announcement')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Write Firebase credentials
        run: echo '${{ secrets.FIREBASE_CREDENTIALS_JSON }}' > firebase-credentials.json
      - name: Send new poll notifications
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_CREDENTIALS_PATH: firebase-credentials.json
        run: python send_notification.py --type poll_opened
